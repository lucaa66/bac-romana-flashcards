<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcarduri Bac Română</title>
  <style>
    :root {
      --green: #4b5563;
      --green-dark: #3C444D;
      --paper: #EBE3DB;
      --background: #F2EFEB;
      --line: #d9d5ce;
      --text: #1f2a24;
      --muted: #42424D;
      --shadow: 0 18px 46px rgba(31, 42, 36, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, "SF Pro Text", "SF Pro Display", Aptos, "Segoe UI Variable", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: var(--background);
    }

    button {
      font: inherit;
      font-weight: 600;
    }

    .app {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 46px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
      border-bottom: 1px solid rgba(31, 42, 36, 0.1);
      padding-bottom: 24px;
    }

    .title {
      margin: 0;
      color: #1d211e;
      font-size: clamp(23px, 3.7vw, 32px);
      font-weight: 600;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .counter {
      flex: 0 0 auto;
      color: #8a8a8a;
      padding: 0;
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 400;
      line-height: 1.1;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .tab-button {
      min-height: 48px;
      border: 1px solid rgba(45, 75, 147, 0.22);
      border-radius: 8px;
      background: var(--paper);
      color: var(--green);
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .tab-button:hover,
    .tab-button:focus-visible {
      transform: translateY(-1px);
      outline: none;
    }

    .tab-button.active {
      background: var(--green);
      color: #ffffff;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .question-card {
      min-height: 250px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      background: var(--paper);
      border: 1px solid rgba(31, 42, 36, 0.11);
      border-radius: 22px;
      padding: clamp(28px, 5vw, 48px);
      box-shadow: var(--shadow);
    }

    .question-text {
      width: 100%;
      margin: 0;
      color: var(--text);
      font-size: clamp(21px, 3.2vw, 29px);
      font-weight: 600;
      line-height: 1.48;
      text-align: left;
    }

    .answer-button,
    .random-button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      background: var(--green);
      color: #ffffff;
      transition: background 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    .answer-button {
      align-self: stretch;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 52px;
      margin-top: 30px;
      font-size: 18px;
      border-radius: 14px;
      box-shadow: 0 12px 26px rgba(45, 90, 61, 0.16);
    }

    .answer-button::after {
      content: "";
      width: 15px;
      height: 15px;
      border: 3px solid currentColor;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, currentColor 0 2.4px, transparent 2.9px);
      opacity: 0.95;
    }

    .random-button {
      min-height: 98px;
      margin-top: 18px;
      font-size: 38px;
      line-height: 1;
      box-shadow: 0 15px 34px rgba(45, 90, 61, 0.2);
    }

    .answer-button:hover,
    .answer-button:focus-visible,
    .random-button:hover,
    .random-button:focus-visible {
      background: var(--green-dark);
      transform: translateY(-1px);
      outline: none;
    }

    .gallery {
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .gallery.visible {
      display: grid;
    }

    .gallery img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
      background: #efece7;
      border: 1px solid var(--line);
      box-shadow: 0 10px 26px rgba(31, 42, 36, 0.1);
    }

    .works-list {
      display: grid;
      gap: 10px;
    }

    .work-block {
      background: var(--paper);
      border: 1px solid #E4E7EB;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 28px #EBE6E1;
    }

    .work-button {
      width: 100%;
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border: 0;
      background: var(--paper);
      color: var(--green);
      cursor: pointer;
      text-align: left;
      font-size: 18px;
    }

    .work-button:hover,
    .work-button:focus-visible {
      background: #D9D3CA;
      outline: none;
    }

    .work-button::after {
      content: "+";
      flex: 0 0 auto;
      font-size: 22px;
      color: #D9D3CA;
    }

    .work-block.open .work-button::after {
      content: "-";
    }

    .question-list {
      display: none;
      margin: 0;
      padding: 0 14px 14px;
      list-style: none;
      border-top: 1px solid #E4E7EB;
    }

    .work-block.open .question-list {
      display: grid;
      gap: 8px;
      padding-top: 12px;
    }

    .question-link {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #EBE4DD;
      color: var(--text);
      cursor: pointer;
      padding: 11px 13px;
      text-align: left;
      line-height: 1.35;
      font-size: 16px;
    }

    .question-link:hover,
    .question-link:focus-visible {
      border-color: rgba(45, 77, 145, 0.38);
      background: rgba(45, 54, 166, 0.059);
      outline: none;
    }

    @media (max-width: 620px) {
      .app {
        width: min(100% - 22px, 920px);
        padding-top: 18px;
      }

      .topbar {
        align-items: flex-start;
      }

      .counter {
        text-align: right;
      }

      .question-card {
        min-height: 220px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1 class="title">Română · BAC</h1>
      <div class="counter"><span id="questionCount">0</span> întrebări</div>
    </header>

    <nav class="tabs" aria-label="Navigare">
      <button class="tab-button active" id="randomTabButton" type="button" aria-controls="randomPanel">Aleatorie</button>
      <button class="tab-button" id="allTabButton" type="button" aria-controls="allPanel">Toate</button>
    </nav>

    <section class="panel active" id="randomPanel" aria-labelledby="randomTabButton">
      <article class="question-card">
        <p class="question-text" id="questionText"></p>
        <button class="answer-button" id="answerButton" type="button">Răspuns</button>
      </article>
      <div class="gallery" id="gallery" aria-live="polite"></div>
      <button class="random-button" id="randomButton" type="button" aria-label="Alege o întrebare aleatorie">↻</button>
    </section>

    <section class="panel" id="allPanel" aria-labelledby="allTabButton">
      <div class="works-list" id="worksList"></div>
    </section>
  </main>

    const questionCount = document.querySelector("#questionCount");
    const questionText = document.querySelector("#questionText");
    const gallery = document.querySelector("#gallery");
    const answerButton = document.querySelector("#answerButton");
    const randomButton = document.querySelector("#randomButton");
    const randomTabButton = document.querySelector("#randomTabButton");
    const allTabButton = document.querySelector("#allTabButton");
    const randomPanel = document.querySelector("#randomPanel");
    const allPanel = document.querySelector("#allPanel");
    const worksList = document.querySelector("#worksList");

    let currentQuestionIndex = 0;

    questionCount.textContent = questions.length;

    function switchTab(tabName) {
      const showRandom = tabName === "random";

      randomTabButton.classList.toggle("active", showRandom);
      allTabButton.classList.toggle("active", !showRandom);
      randomPanel.classList.toggle("active", showRandom);
      allPanel.classList.toggle("active", !showRandom);
    }

    function hideGallery() {
      gallery.classList.remove("visible");
      gallery.replaceChildren();
    }

    function loadQuestion(index) {
      currentQuestionIndex = index;
      questionText.textContent = questions[currentQuestionIndex].text;
      hideGallery();
    }

    function showAnswer() {
      hideGallery();

      const currentOpera = Array.isArray(questions[currentQuestionIndex].opera)
        ? questions[currentQuestionIndex].opera.join(", ")
        : questions[currentQuestionIndex].opera;

      questions[currentQuestionIndex].images.forEach((src, imageIndex) => {
        const image = document.createElement("img");
        image.src = src;
        image.alt = `${currentOpera} - imagine ${imageIndex + 1}`;
        image.loading = "lazy";
        gallery.append(image);
      });

      if (gallery.children.length > 0) {
        gallery.classList.add("visible");
      }
    }

    function chooseRandomQuestion() {
      if (questions.length < 2) {
        loadQuestion(0);
        return;
      }

      let nextIndex = currentQuestionIndex;
      while (nextIndex === currentQuestionIndex) {
        nextIndex = Math.floor(Math.random() * questions.length);
      }

      loadQuestion(nextIndex);
    }

    function createAllQuestionsView() {
      const orderedOpears = [
        "Ion",
        "Moromeții",
        "Moara cu noroc",
        "Eu nu strivesc corola de minuni a lumii",
        "O scrisoare pierdută",
        "Iona",
        "Povestea lui Harap-Alb",
        "Baltagul",
        "Ultima noapte de dragoste, întâia noapte de război",
        "Enigma Otiliei",
        "Luceafărul",
        "Plumb",
        "Flori de mucigai",
        "Riga Crypto și lapona Enigel",
        "Leoaică tânără, iubirea",
        "Subiectul II"
      ];

      const groupedQuestions = new Map();
      orderedOpears.forEach(opera => groupedQuestions.set(opera, []));

      questions.forEach((question, index) => {
        if (Array.isArray(question.opera)) {
          question.opera.forEach(singleOpera => {
            if (groupedQuestions.has(singleOpera)) {
              groupedQuestions.get(singleOpera).push({ question, index });
            }
          });
        } else {
          if (groupedQuestions.has(question.opera)) {
            groupedQuestions.get(question.opera).push({ question, index });
          }
        }
      });

      groupedQuestions.forEach((items, opera) => {
        if (items.length === 0) return;

        const block = document.createElement("section");
        block.className = "work-block";

        const workButton = document.createElement("button");
        workButton.className = "work-button";
        workButton.type = "button";
        workButton.textContent = opera;

        const list = document.createElement("ul");
        list.className = "question-list";

        items.forEach(({ question, index }) => {
          const item = document.createElement("li");
          const questionButton = document.createElement("button");

          questionButton.className = "question-link";
          questionButton.type = "button";
          questionButton.textContent = question.text;
          questionButton.addEventListener("click", () => {
            loadQuestion(index);
            switchTab("random");
          });

          item.append(questionButton);
          list.append(item);
        });

        workButton.addEventListener("click", () => {
          block.classList.toggle("open");
        });

        block.append(workButton, list);
        worksList.append(block);
      });
    }

    randomTabButton.addEventListener("click", () => switchTab("random"));
    allTabButton.addEventListener("click", () => switchTab("all"));
    answerButton.addEventListener("click", showAnswer);
    randomButton.addEventListener("click", chooseRandomQuestion);

    createAllQuestionsView();
    
    // Aici s-a modificat: alege o întrebare aleatorie chiar de la inițializare
    if (questions.length > 0) {
      const initialRandomIndex = Math.floor(Math.random() * questions.length);
      loadQuestion(initialRandomIndex);
    }
